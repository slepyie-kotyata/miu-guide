<ion-content [fullscreen]="true">
  <!-- Главный контейнер карты (в будущем сюда добавим логику зума) -->
  <div class="map-viewport">
    
    <!-- Оборачиваем картинку в pinch-zoom -->
    <pinch-zoom>
      <img [src]="getMapImage()" class="map-image" alt="Карта этажа" />
    </pinch-zoom>

    <!-- Плавающая панель выбора этажей справа -->
    <div class="floor-selector">
      <!-- Перебираем массив этажей и создаем кнопки -->
      <button 
        *ngFor="let floor of floors" 
        class="floor-btn" 
        [class.active]="currentFloor === floor"
        (click)="selectFloor(floor)"
        type="button">
        {{ floor }}
      </button>
    </div>

    <!-- Кнопка в правом нижнем углу -->
    <button class="action-btn" type="button">
      <!-- Сюда можно добавить иконку геолокации или сброса зума -->
    </button>

  </div>

</ion-content>
