<ion-tabs>
  <ion-tab-bar
    slot="bottom"
    class="custom-tab-bar"
    [style.pointer-events]="dialogService.currentMessage() ? 'none' : 'auto'"
    [style.opacity]="dialogService.currentMessage() ? '0.5' : '1'">

    <ion-tab-button tab="map">
      <ion-icon src="/assets/icons/map_icon.svg"></ion-icon>
    </ion-tab-button>

    <ion-tab-button tab="schedule">
      <ion-icon src="/assets/icons/schedule_icon.svg"></ion-icon>
    </ion-tab-button>

    <ion-tab-button tab="profile">
      <ion-icon src="/assets/icons/profile_icon.svg"></ion-icon>
    </ion-tab-button>

  </ion-tab-bar>
</ion-tabs>
