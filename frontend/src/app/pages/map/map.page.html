<ion-content [fullscreen]="true" [scrollY]="false">
  <img src="/assets/icons/i_info.svg" class="top-info-icon" (click)="showInfo()" alt="Info" />
  <h1 class="page-title">{{ mapTitle() }}</h1>

  @if (showMap()) {
    <pinch-zoom class="map-zoom-container">
      <div class="map-wrapper" (click)="onMapClick($event)">
        
        <div class="map-container" [innerHTML]="svgContent()"></div>

        @if (isModalOpen() && roomData()) {
          <div 
            class="map-tooltip-card" 
            [style.top.px]="tooltipTop()" 
            [style.left.px]="tooltipLeft()"
            (click)="$event.stopPropagation()"
          >
            <div class="close-btn" (click)="closeRoomModal()">×</div>
            
            <div class="tooltip-content">
              <div class="tooltip-title">{{ roomData()?.name }}</div>
              <div class="tooltip-category">Категория: {{ roomData()?.category }}</div>
              <div class="tooltip-desc">{{ roomData()?.description }}</div>
            </div>
          </div>
        }
      </div>
    </pinch-zoom>
  }

  <div class="floor-selector">
    @for (floor of currentFloors(); track floor) {
      <button
        class="floor-btn"
        [class.active]="currentFloor() === floor"
        (click)="selectFloor(floor)">
        {{ floor }}
      </button>
    }
  </div>

  <button class="mode-toggle-btn" (click)="toggleMode()">
    {{ currentMode() }}
  </button>

  <app-assistant-cat></app-assistant-cat>
</ion-content>
