<ion-content [fullscreen]="true">
  <div class="schedule-content">
    
    <!-- Выводим динамический заголовок со строкой дат -->
    <div class="header-container">
  <h1 class="main-title">{{ weekType }}</h1>
  <p class="date-subtitle">{{ dateRange }}</p>
</div>

    <div class="schedule-block">
      
      <!-- Показываем спиннер, пока идет загрузка -->
      <ion-item *ngIf="isLoading" style="text-align: center; padding: 20px;" >
          <ion-label>Загрузка расписания</ion-label>
        <ion-spinner name="crescent" ></ion-spinner>
      </ion-item>

      <!-- Если загрузка прошла, но список пуст -->
      <div *ngIf="!isLoading && lessons.length === 0" style="text-align: center; padding: 20px; color: #888;">
        На этот день расписания нет
      </div>

    <ng-container *ngIf="!isLoading && lessons.length > 0">
      <div class="lesson-item" *ngFor="let lesson of lessons; let i = index">
        <div class="lesson-number-wrapper">
          <div class="lesson-number">{{ i + 1 }}</div>
        </div>
        <div class="lesson-text">
          <div class="lesson-time">{{ lesson.beginLesson }} – {{ lesson.endLesson }}</div>
          <div class="lesson-title">{{ lesson.discipline }}</div>
          
          <div class="lesson-subtitle" *ngFor="let prof of lesson.listOfLecturers">
            {{ prof.auditorium }} – {{ prof.lecturer }}
          </div>
          
          <div class="lesson-type" style="font-size: 0.8em; color: #666;">
            {{ lesson.kindOfWork }}
          </div>
        </div>
      </div>
    </ng-container>

    </div>

    <!-- Блок с переключением дней недели -->
    <div class="days-nav-wrapper">
      <!-- ДОБАВЛЕНО: (click)="prevWeek()" -->
      <button class="nav-arrow-btn" type="button" (click)="prevWeek()">
        <ion-icon name="caret-back" class="nav-arrow"></ion-icon>
      </button>      
      
      <div class="days-group">
        <button 
          *ngFor="let day of weekDays; let i = index"
          class="day-btn" 
          [class.active]="activeDayIndex === i"
          (click)="selectDay(i)"
          type="button">
          <!-- ДОБАВЛЕНО: .name, так как теперь это объект -->
          {{ day.name }}
        </button>
      </div>
      
      <!-- ДОБАВЛЕНО: (click)="nextWeek()" -->
      <button class="nav-arrow-btn" type="button" (click)="nextWeek()">
        <ion-icon name="caret-forward" class="nav-arrow"></ion-icon>
      </button>
    </div>

  </div>
</ion-content>
