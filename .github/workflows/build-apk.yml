name: Build Android APK

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.head_ref == 'dev/front' &&
       (github.event.action != 'closed' || github.event.pull_request.merged == true))
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.action == 'closed' && 'main' || '' }}

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bump package.json version
        run: npm version 1.0.${{ github.run_number }} --no-git-tag-version

      - name: Build web app (production)
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Add Android platform
        run: npx cap add android

      - name: Inject dynamic versionCode into gradle
        run: sed -i 's/versionCode [0-9]*/versionCode ${{ github.run_number }}/g' android/app/build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.injected.version.code=${{ github.run_number }} \
            -Pandroid.injected.version.name="1.0.${{ github.run_number }}"
            
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: miu-guide-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Generate release tag
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        id: reltag
        run: echo "tag=v1.0.${{ github.run_number }}.${{ github.run_attempt }}-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with APK
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.reltag.outputs.tag }}" \
            android/app/build/outputs/apk/debug/*.apk \
            --title "MIU Guide APK #${{ github.run_number }}" \
            --notes "Автоматическая сборка debug APK из коммита $(git rev-parse --short HEAD) на main."
