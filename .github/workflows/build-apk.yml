name: Build Android APK

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.head_ref == 'dev/front' &&
       (github.event.action != 'closed' || github.event.pull_request.merged == true))
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.action == 'closed' && 'main' || '' }}
          fetch-depth: 0

      - name: Compute version info
        id: ver
        run: |
          VERSION_NAME=$(node -p "require('./package.json').version")
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Check keystore availability
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Inject version into package.json
        run: npm version ${{ steps.ver.outputs.version_name }} --no-git-tag-version --allow-same-version

      - name: Build web app (production)
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons & splash
        run: npx capacitor-assets generate --android

      - name: Inject dynamic versionCode into gradle
        run: sed -i 's/versionCode [0-9]*/versionCode ${{ steps.ver.outputs.version_code }}/g' android/app/build.gradle

      - name: Decode release keystore
        if: steps.keystore.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          echo "Keystore decoded: $(wc -c < android/app/release.keystore) bytes"

      - name: Create keystore.properties
        if: steps.keystore.outputs.available == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/app/keystore.properties << 'PROPS'
          storeFile=release.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          PROPS

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build release APK
        if: steps.keystore.outputs.available == 'true'
        working-directory: frontend/android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/frontend/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            -Pandroid.injected.version.code=${{ steps.ver.outputs.version_code }} \
            -Pandroid.injected.version.name=${{ steps.ver.outputs.version_name }}

      - name: Fallback build debug APK (no keystore configured)
        if: steps.keystore.outputs.available != 'true'
        working-directory: frontend/android
        run: |
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.injected.version.code=${{ steps.ver.outputs.version_code }} \
            -Pandroid.injected.version.name=${{ steps.ver.outputs.version_name }}

      - name: Upload release APK artifact
        if: steps.keystore.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: miu-guide-release-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload debug APK artifact (fallback)
        if: steps.keystore.outputs.available != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: miu-guide-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Generate release tag
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        id: reltag
        run: echo "tag=v${{ steps.ver.outputs.version_name }}-${{ steps.ver.outputs.version_code }}-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with APK
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH=$(ls android/app/build/outputs/apk/release/*.apk 2>/dev/null || ls android/app/build/outputs/apk/debug/*.apk)
          gh release create "${{ steps.reltag.outputs.tag }}" \
            $APK_PATH \
            --title "ММУ — Цифровой куратор v${{ steps.ver.outputs.version_name }}" \
            --notes "Автоматическая сборка APK из коммита $(git rev-parse --short HEAD) на main. Версия ${{ steps.ver.outputs.version_name }} (code ${{ steps.ver.outputs.version_code }})."
